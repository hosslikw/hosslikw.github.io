      :root {
        /* SIZES - SIZES - SIZES- -SIZES */
        --ratio: 1.2;
        --measure: 65ch;
        --h3: 12;
        --columns: 12;
        --gap: var(--s16);
        --border-thin: var(--s-5);
        --border-thick: var(--s2);
        --layout-space: var(--s24);

        --headerheight: calc(11vw + var(--s80));
        /* The inner width of the page, excluding margins */
        --innerWidth: calc(100% - (var(--page-margin-total) * 2));
        /* The full width of the page, including margins */
        --fullBleedWidth: calc(100% + (var(--page-margin-total) * 2));
        /* The margin around the page content area, minus the column gaps */
        --page-margin-: calc(var(--page-margin-total) - (var(--gap) / 2));
        /* The total margin around the page content area */
        --page-margin-total: var(--s30);
        padding: var(--page-margin-total);
        --s30: 1.875rem;
        /* NOTE - SIZE CHART: */
        --f-5: clamp(0.33rem, 0.39rem + -0.29vw, 0.18rem);
        --f-4: clamp(0.41rem, 0.47rem + -0.31vw, 0.25rem);
        --f-3: clamp(0.51rem, 0.57rem + -0.31vw, 0.35rem);
        --f-2: clamp(0.64rem, 0.69rem + -0.27vw, 0.5rem);
        --f-1: clamp(0.8rem, 0.84rem + -0.18vw, 0.71rem);
        --f0: clamp(1rem, 1rem + 0vw, 1rem);
        --f1: clamp(1.25rem, 1.19rem + 0.32vw, 1.41rem);
        --f2: clamp(1.56rem, 1.39rem + 0.85vw, 2rem);
        --f3: clamp(1.95rem, 1.61rem + 1.7vw, 2.83rem);
        --f4: clamp(2.44rem, 1.83rem + 3.04vw, 4rem);
        --f5: clamp(3.05rem, 2.04rem + 5.07vw, 5.65rem);
      }
      * {
        max-inline-size: var(--measure);
      }
      img {
        display: block;
        max-width: 100%;
      }
      html,
      body,
      div,
      header,
      nav,
      main,
      footer {
        max-inline-size: none;
      }
      html {
        font-size: 16px;
      }
      .stack {
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
      }
      /* resets the margins */
      .stack>* {
        margin-block: 0;
      }
      .stack>*+* {
        margin-block-start: var(--f1, 1em);
      }
      .header-height {
        background-color: var(--grey-80);
        height: var(--headerheight);
        display: flex;
        gap: 10ch;
        align-items: center;
        justify-content: space-evenly;
        border:dotted yellow var(--border-thick);

      }
      .inner-width {
        background-color: var(--purple);
        width: var(--innerWidth);
        height: auto;
        box-sizing: border-box;
        margin-inline: auto;
        padding-inline: var(--s1) var(--s1);
        display: inline-flex;
      }
      .full-bleed {
        width: var(--fullBleedWidth);
        display: flex;
        flex-flow: row nowrap;
        outline: solid white var(--border-thin) ;
        gap: 20ch;
      }
      h3 {
        justify-content: center;
      }
      .image-row>* {
        align-self: auto;
        height: 100%;
        margin-block-end: var(var(--page-margin-total));
      }
      .page-margin {
        width: var(--page-margin-);
        background-color: var(--accent);
        height: 2rem;
        margin-top: 50px;
      }
      .page-margin-total {
        background-color: var(--white);
        height: 2rem;
        width: var(--s30);
        margin-top: 50px;
      }
      .switcher {
        display: flex;
        flex-wrap: wrap;
        gap: var(--s1);
      }
      .switcher>* {
        flex-grow: 1;
        flex-basis: calc((30rem - 100%) * 999);
      }
      .switcher> :nth-last-child(n+ 6),
      .switcher> :nth-last-child(n+ 6)~* {
        flex-basis: 100%;
      }
      .section-container {
        margin-inline-start: 20px;
        height: 100vh;
        overflow-x: hidden;
        line-height: 1.5rem;
      }
      .section-container > * {
        border: 2px solid black;
        white-space: nowrap;
        column-count: 7;
        overflow-x: hidden;
        font-family: acumin-pro-wide, sans-serif;
      }
      .span-1 {
        color: whitesmoke;
        outline: solid 2px var(--accent);
        width: 45vw;
      }
      .span-2 {
        color: whitesmoke;
        outline: solid 2px var(--accent);
        width: 45vw;

      }
