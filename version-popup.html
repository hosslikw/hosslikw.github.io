<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../sizes.css" rel="stylesheet" />
    <title>System Fonts</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap");

      :root {
        --white: #f7f7f7;
        --grey-10: #edeeed;
        --grey-20: #d3d4d4;
        --grey-30: #bababa;
        --grey-40: #8f8f8f;
        --grey-50: #6b6b6b;
        --grey-60: #525252;
        --grey-70: #454545;
        --grey-80: #313030;
        --grey-90: #272727;
        --black: #1d1d1b;
        font-size: (var(--s22), 2vw, var(--s30));
      }

      * {
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--dark-text);
        color: var(--white);
        font-family: "Khmer MN";
        list-style-type: none;
        text-align: center;
        margin: 0;
        padding: 0;
      }

      .grid-container-sf {
        display: inline-block;
        font-size: var(--f20);
        padding: var(--s20);
        margin-top: 16rem;
        width: var(--s200);
      }

      .grid-item {
        width: var(--s100);
      }

      .popup,
      .grid-item {
        background: rgb(33, 33, 33);
        background: linear-gradient(
          162deg,
          rgba(33, 33, 33, 1) 2%,
          rgba(41, 41, 41, 0.9528186274509804) 60%
        );
        border-radius: 0.2em;
        /* padding: var(--s20); */
        text-align: center;
        position: relative;
        width: auto;
        cursor: pointer;
        border: var(--grey-60) solid var(--s1);
      }

      .grid-item::before {
        content: "";
        visibility: hidden !important;
        position: absolute;
        top: -var(--s10);
        left: -var(--s10);
        right: -var(--s10);
        bottom: -var(--s10);
        pointer-events: none;
      }

      .popup .popup-text {
        /* visibility: hidden; */
        visibility: hidden;
        width: auto;
        background-color: var(--grey-60);
        color: var(--white);
        text-align: center;
        border-radius: var(--s6);
        padding: var(--s10) 0;
        position: absolute;
        z-index: 1;
        bottom: 160%;
        left: 60%;
        margin-left: calc(-1 * var(--s90));
        display: block;
      }

      /* Popup arrow */
      .popup .popup-text::after {
        content: "";
        visibility: visible !important;
        bottom: 100%;
        left: 20%;
        padding: auto;
        border-width: var(--s5);
        border-style: solid;
        border-color: #555 transparent transparent transparent;
      }

      /* Toggle this class - hide and show the popup */
      .popup .show {
        visibility: visible;
        -webkit-animation: fadeIn 0.4s;
        animation: fadeIn 0.4s;
      }

      /* Change the color of the options menu links on hover */
      .popup a:hover {
        background-color: #666;
      }

      /* Add animation (fade in the popup) */
      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div class="grid-container-sf">
      <div class="grid-item">
        options
        <div class="popup" id="my-popup">
          <span class="popup-text show">
            <a href="#" onclick="setTheme('mac')">Mac</a>
            <a href="#" onclick="setTheme('windows')">Windows</a>
            <a href="#" onclick="setTheme('linux')">Linux</a>
            <a href="#" onclick="setTheme('user')">User</a>
          </span>
        </div>
      </div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const gridItem = document.querySelector(".grid-item") // Make sure this targets the correct element
        gridItem.addEventListener("click", function () {
          const popupText = this.querySelector(".popup-text")
          popupText.classList.toggle("show")
        }) // This toggles visibility
      })

      // Define the local storage key for the selected theme
      // Define the local storage key for the selected theme
      const THEME_KEY = "selectedTheme"
      // Define the available themes
      const THEMES = {
        mac: "#1d1d1b",
        windows: "#f7f7f7",
        linux: "#272727",
        user: "#edeeed",
      }

      // Set the selected theme based on the saved theme in local storage
      function setTheme() {
        const savedTheme = localStorage.getItem(THEME_KEY)
        if (savedTheme) {
          applyTheme(savedTheme)
        }
      }

      // Apply the selected theme to the body
      function applyTheme(theme) {
        document.body.style.backgroundColor = THEMES[theme]
      }

      // Set the selected theme on page load
      setTheme()

      // Add an event listener for when the selected theme changes
      document.addEventListener("storage", (event) => {
        if (event.key === THEME_KEY) {
          applyTheme(event.newValue)
        }
      })

      const FONT_PATH_KEY = "systemFontPath"
      localStorage.setItem(FONT_PATH_KEY, "/")
    </script>
  </body>
</html>
