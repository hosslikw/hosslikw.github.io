  <body lang="en-us" dir="ltr" cz-shortcut-listen="true">
    <span tabindex="0" class="modal-tab-sentinel"></span>
    <div data-bi-name="modal">
      <div tabindex="-1" role="dialog" aria-modal="true" class="modal modal-active" data-test-id="modal-container">
        <div class="modal-background"></div>
        <div>
          <div class="modal-card" id="expand-table-modal">
            <div class="modal-card-head padding-xxs buttons buttons-right margin-bottom-none">
              <div>
                <button data-autofocus=""
                        class="modal-close button button-clear button-sm margin-bottom-none display-flex gap-xxs">
                  <span class="icon" aria-hidden="true">
                    <span class="docon docon-collapse color-primary"></span>
                  </span>
                  <span>Collapse table</span>
                </button>
              </div>
            </div>
            <div class="modal-content">
              <div class="has-inner-focus">
                <table aria-label="Table 2" class="table table-sm margin-top-none">
                  <thead>
                    <tr>
                      <th>Product name</th>
                      <th>Font version</th>
                    </tr>
                  </thead>
                  <tbody>
                    <!-- Repeat this block for each row -->
                    <tr>
                      <td>
                        <a href="../fonts/windows-11_font_list" data-linktype="relative-path">Windows 11</a>
                      </td>
                      <td>See the Windows 11 page.</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
