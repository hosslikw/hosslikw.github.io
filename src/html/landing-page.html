    <!-- Common grid base -->
    <style>
      .grid-base {
        /* Assuming you use TailwindCSS or a similar utility-first CSS framework */
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        padding-top: 2.5rem;
        /* py-10 */
        padding-bottom: 2.5rem;
        border-top: 1px dashed;
      }

      @media (min-width: 640px) {

        /* Adjust breakpoint for sm: as per your CSS framework */
        .grid-base {
          grid-template-columns: repeat(9, 1fr);
        }
      }

      .flex {

      /* Specialized for gap and bottom padding */
      .grid-gap {
        gap: 2.5rem;
        /* gap-x-10 */
        padding-bottom: 5rem;
        /* pb-20 */
      }
    </style>
