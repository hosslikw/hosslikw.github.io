<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>collapsing header</title>
		<link src="reset.css" rel="stylesheet"/>
		<link src="collapsing-header.css" rel="stylesheet" />
		<link src="colors.css" rel="stylesheet"/>
		<link src="sizes.css" rel="stylesheet"/>
		<link src="fonts.css" rel="stylesheet" />
		<style>
			abbr:where([title]) {
				text-decoration: underline dotted;
			}
			sub,
			sup {
				font-size: 75%;
				line-height: 0;
				position: relative;
				vertical-align: baseline;
			}
			sub {
				bottom: -0.25em;
			}
			sup {
				top: -0.5em;
			}
			table {
				text-indent: 0;
				border-color: inherit;
				border-collapse: collapse;
			}
			button,
			select {
				text-transform: none;
			}
			button,
			[type='button'],
			[type='reset'],
			[type='submit'] {
				background-color: transparent;
				background-image: none;
			}
			progress {
				vertical-align: baseline;
			}
			[type='search'] {
				outline-offset: -2px;
			}
			summary {
				display: list-item;
			}
			fieldset {
				margin: 0;
				padding: 0;
			}
			img,
			video {
				max-width: 100%;
				height: auto;
			}
			.\!visible {
				visibility: visible !important
			}
			.sticky {
				position: sticky
			}
			.top-0 {
				top: 0px
			}
			.my-4 {
				margin-top: 1rem;
				margin-bottom: 1rem
			}
			.mb-4 {
				margin-bottom: 1rem
			}
			.mb-6 {
				margin-bottom: 1.5rem
			}
			.mr-auto {
				margin-right: auto
			}
			.block {
				display: block
			}
			.flex {
				display: flex
			}
			.hidden {
				display: none
			}
			.h-6 {
				height: 1.5rem
			}
			.w-6 {
				width: 1.5rem
			}
			.w-full {
				width: 100%
			}
			.grow {
				flex-grow: 1
			}
			.basis-\[100\%\] {
				flex-basis: 100%
			}
			.flex-col {
				flex-direction: column
			}
			.items-center {
				align-items: center
			}
			.justify-between {
				justify-content: space-between
			}
			.rounded {
				border-radius: 0.25rem
			}
			.border-0 {
				border-width: 0px
			}
			.bg-neutral-100 {
				--tw-bg-opacity: 1;
				background-color: rgb(245 245 245 / var(--tw-bg-opacity))
			}
			.bg-transparent {
				background-color: transparent
			}
			.bg-white {
				--tw-bg-opacity: 1;
				background-color: rgb(255 255 255 / var(--tw-bg-opacity))
			}
			.p-12 {
				padding: 3rem
			}
			.px-2 {
				padding-left: 0.5rem;
				padding-right: 0.5rem
			}
			.px-6 {
				padding-left: 1.5rem;
				padding-right: 1.5rem
			}
			.px-7 {
				padding-left: 1.75rem;
				padding-right: 1.75rem
			}
			.py-2 {
				padding-top: 0.5rem;
				padding-bottom: 0.5rem
			}
			.py-3 {
				padding-top: 0.75rem;
				padding-bottom: 0.75rem
			}
			.pb-2 {
				padding-bottom: 0.5rem
			}
			.pb-2\.5 {
				padding-bottom: 0.625rem
			}
			.pt-3 {
				padding-top: 0.75rem
			}
			.text-center {
				text-align: center
			}
			.text-4xl {
				font-size: 2.25rem;
				line-height: 2.5rem
			}
			.text-sm {
				font-size: 0.875rem;
				line-height: 1.25rem
			}
			.text-xl {
				font-size: 1.25rem;
				line-height: 1.75rem
			}
			.font-medium {
				font-weight: 500
			}
			.font-semibold {
				font-weight: 600
			}
			.uppercase {
				text-transform: uppercase
			}

			.text-white {
				--tw-text-opacity: 1;
				color: rgb(255 255 255 / var(--tw-text-opacity))
			}

			.shadow-\[0_4px_9px_-4px_\#3b71ca\] {
				--tw-shadow: 0 4px 9px -4px #3b71ca;
				--tw-shadow-colored: 0 4px 9px -4px var(--tw-shadow-color);
				box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)
			}

			.shadow-lg {
				--tw-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
				--tw-shadow-colored: 0 10px 15px -3px var(--tw-shadow-color), 0 4px 6px -4px var(--tw-shadow-color);
				box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)
			}
			.transition {
				transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity, box-shadow, transform, filter, backdrop-filter;
				transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
				transition-duration: 150ms
			}

			.transition-shadow {
				transition-property: box-shadow;
				transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
				transition-duration: 150ms
			}

			.duration-150 {
				transition-duration: 150ms
			}

			.ease-in-out {
				transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1)
			}

			.hover\:text-neutral-700:hover {
				--tw-text-opacity: 1;
				color: rgb(64 64 64 / var(--tw-text-opacity))
			}

			.hover\:shadow-\[0_8px_9px_-4px_rgba\(59\2c 113\2c 202\2c 0\.3\)\2c 0_4px_18px_0_rgba\(59\2c 113\2c 202\2c 0\.2\)\]:hover {
				--tw-shadow: 0 8px 9px -4px rgba(59, 113, 202, 0.3), 0 4px 18px 0 rgba(59, 113, 202, 0.2);
				--tw-shadow-colored: 0 8px 9px -4px var(--tw-shadow-color), 0 4px 18px 0 var(--tw-shadow-color);
				box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)
			}

			.focus\:text-neutral-700:focus {
				--tw-text-opacity: 1;
				color: rgb(64 64 64 / var(--tw-text-opacity))
			}

			.focus\:shadow-\[0_8px_9px_-4px_rgba\(59\2c 113\2c 202\2c 0\.3\)\2c 0_4px_18px_0_rgba\(59\2c 113\2c 202\2c 0\.2\)\]:focus {
				--tw-shadow: 0 8px 9px -4px rgba(59, 113, 202, 0.3), 0 4px 18px 0 rgba(59, 113, 202, 0.2);
				--tw-shadow-colored: 0 8px 9px -4px var(--tw-shadow-color), 0 4px 18px 0 var(--tw-shadow-color);
				box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)
			}

			.focus\:outline-none:focus {
				outline: 2px solid transparent;
				outline-offset: 2px
			}

			.focus\:ring-0:focus {
				--tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color);
				--tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(0px + var(--tw-ring-offset-width)) var(--tw-ring-color);
				box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow, 0 0 #0000)
			}

			.active\:shadow-\[0_8px_9px_-4px_rgba\(59\2c 113\2c 202\2c 0\.3\)\2c 0_4px_18px_0_rgba\(59\2c 113\2c 202\2c 0\.2\)\]:active {
				--tw-shadow: 0 8px 9px -4px rgba(59, 113, 202, 0.3), 0 4px 18px 0 rgba(59, 113, 202, 0.2);
				--tw-shadow-colored: 0 8px 9px -4px var(--tw-shadow-color), 0 4px 18px 0 var(--tw-shadow-color);
				box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)
			}

			@media (min-width: 768px) {
				.md\:\!flex {
					display: flex !important
				}

				.md\:hidden {
					display: none
				}

				.md\:basis-auto {
					flex-basis: auto
				}

				.md\:flex-row {
					flex-direction: row
				}

				.md\:flex-wrap {
					flex-wrap: wrap
				}

				.md\:justify-start {
					justify-content: flex-start
				}

				.md\:p-2 {
					padding: 0.5rem
				}
			}

			@media (prefers-color-scheme: dark) {
				.dark\:bg-neutral-600 {
					--tw-bg-opacity: 1;
					background-color: rgb(82 82 82 / var(--tw-bg-opacity))
				}

				.dark\:bg-neutral-700 {
					--tw-bg-opacity: 1;
					background-color: rgb(64 64 64 / var(--tw-bg-opacity))
				}

				.dark\:text-neutral-200 {
					--tw-text-opacity: 1;
					color: rgb(229 229 229 / var(--tw-text-opacity))
				}

				.dark\:shadow-\[0_4px_9px_-4px_rgba\(59\2c 113\2c 202\2c 0\.5\)\] {
					--tw-shadow: 0 4px 9px -4px rgba(59, 113, 202, 0.5);
					--tw-shadow-colored: 0 4px 9px -4px var(--tw-shadow-color);
					box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)
				}

				.dark\:hover\:text-white:hover {
					--tw-text-opacity: 1;
					color: rgb(255 255 255 / var(--tw-text-opacity))
				}

				.dark\:hover\:shadow-\[0_8px_9px_-4px_rgba\(59\2c 113\2c 202\2c 0\.2\)\2c 0_4px_18px_0_rgba\(59\2c 113\2c 202\2c 0\.1\)\]:hover {
					--tw-shadow: 0 8px 9px -4px rgba(59, 113, 202, 0.2), 0 4px 18px 0 rgba(59, 113, 202, 0.1);
					--tw-shadow-colored: 0 8px 9px -4px var(--tw-shadow-color), 0 4px 18px 0 var(--tw-shadow-color);
					box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)
				}

				.dark\:focus\:text-white:focus {
					--tw-text-opacity: 1;
					color: rgb(255 255 255 / var(--tw-text-opacity))
				}

				.dark\:focus\:shadow-\[0_8px_9px_-4px_rgba\(59\2c 113\2c 202\2c 0\.2\)\2c 0_4px_18px_0_rgba\(59\2c 113\2c 202\2c 0\.1\)\]:focus {
					--tw-shadow: 0 8px 9px -4px rgba(59, 113, 202, 0.2), 0 4px 18px 0 rgba(59, 113, 202, 0.1);
					--tw-shadow-colored: 0 8px 9px -4px var(--tw-shadow-color), 0 4px 18px 0 var(--tw-shadow-color);
					box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)
				}

				.dark\:active\:shadow-\[0_8px_9px_-4px_rgba\(59\2c 113\2c 202\2c 0\.2\)\2c 0_4px_18px_0_rgba\(59\2c 113\2c 202\2c 0\.1\)\]:active {
					--tw-shadow: 0 8px 9px -4px rgba(59, 113, 202, 0.2), 0 4px 18px 0 rgba(59, 113, 202, 0.1);
					--tw-shadow-colored: 0 8px 9px -4px var(--tw-shadow-color), 0 4px 18px 0 var(--tw-shadow-color);
					box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)
				}
			}

			.\[\&\>svg\]\:w-5>svg {
				width: 1.25rem
			}
		</style>
	</head>

	<body>

		<header>
			<!-- Navbar -->
			<nav
				  class="sticky top-0 flex w-full items-center justify-between bg-white py-2 text-neutral-600 shadow-lg hover:text-neutral-700 focus:text-neutral-700 dark:bg-neutral-600 dark:text-neutral-200 md:flex-wrap md:justify-start"
				  data-te-navbar-ref>
				<div class="px-6">
					<!-- Hamburger menu button -->
					<button
							  class="border-0 bg-transparent px-2 py-3 text-xl leading-none transition-shadow duration-150 ease-in-out hover:text-neutral-700 focus:text-neutral-700 dark:hover:text-white dark:focus:text-white md:hidden"
							  type="button"
							  data-te-collapse-init
							  data-te-target="#navbarSupportedContentU"
							  aria-controls="navbarSupportedContentU"
							  aria-expanded="false"
							  aria-label="Toggle navigation">
						<!-- Hamburger menu icon -->
						<span class="[&>svg]:w-5">
							<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
								  stroke="currentColor" class="h-6 w-6">
								<path stroke-linecap="round" stroke-linejoin="round"
										d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
							</svg>
						</span>
					</button>

					<!-- Navigation links -->
					<div class="!visible hidden grow basis-[100%] items-center md:!flex md:basis-auto"
						  id="navbarSupportedContentU" data-te-collapse-item>

						<ul class="mr-auto flex flex-col md:flex-row" data-te-navbar-nav-ref>
							<li data-te-nav-item-ref>
								<a
									class="block transition duration-150 ease-in-out hover:text-neutral-700 focus:text-neutral-700 dark:hover:text-white dark:focus:text-white md:p-2 [&.active]:border-primary [&.active]:text-primary"
									href="#!"
									data-te-nav-link-ref
									data-te-ripple-init
									data-te-ripple-color="light">Home</a>
							</li>
							<li data-te-nav-item-ref>
								<a
									class="block transition duration-150 ease-in-out hover:text-neutral-700 focus:text-neutral-700 dark:hover:text-white dark:focus:text-white md:p-2 [&.active]:border-primary [&.active]:text-primary"
									href="#!"
									data-te-nav-link-ref
									data-te-ripple-init
									data-te-ripple-color="light">Features</a>
							</li>
							<li data-te-nav-item-ref>
								<a
									class="block transition duration-150 ease-in-out hover:text-neutral-700 focus:text-neutral-700 dark:hover:text-white dark:focus:text-white md:p-2 [&.active]:border-primary [&.active]:text-primary"
									href="#!"
									data-te-nav-link-ref
									data-te-ripple-init
									data-te-ripple-color="light">Pricing</a>
							</li>
							<li data-te-nav-item-ref>
								<a
									class="block transition duration-150 ease-in-out hover:text-neutral-700 focus:text-neutral-700 dark:hover:text-white dark:focus:text-white md:p-2 [&.active]:border-primary [&.active]:text-primary"
									href="#!"
									data-te-nav-link-ref
									data-te-ripple-init
									data-te-ripple-color="light">About</a>
							</li>
						</ul>
					</div>
				</div>
			</nav>
			<!-- Navbar -->

			<!-- Hero section with heading, subheading and button -->
			<div class="bg-neutral-100 p-12 text-center text-neutral-700 dark:bg-neutral-700 dark:text-neutral-200"
				  id="header-content">
				<h2 class="mb-4 text-4xl font-semibold">Heading</h2>
				<h4 class="mb-6 text-xl font-semibold">Subheading</h4> <button type="button" data-te-ripple-init
						  data-te-ripple-color="light"
						  class="rounded bg-primary px-7 pb-2.5 pt-3 text-sm font-medium uppercase leading-normal text-white shadow-[0_4px_9px_-4px_#3b71ca] transition duration-150 ease-in-out hover:bg-primary-600 hover:shadow-[0_8px_9px_-4px_rgba(59,113,202,0.3),0_4px_18px_0_rgba(59,113,202,0.2)] focus:bg-primary-600 focus:shadow-[0_8px_9px_-4px_rgba(59,113,202,0.3),0_4px_18px_0_rgba(59,113,202,0.2)] focus:outline-none focus:ring-0 active:bg-primary-700 active:shadow-[0_8px_9px_-4px_rgba(59,113,202,0.3),0_4px_18px_0_rgba(59,113,202,0.2)] dark:shadow-[0_4px_9px_-4px_rgba(59,113,202,0.5)] dark:hover:shadow-[0_8px_9px_-4px_rgba(59,113,202,0.2),0_4px_18px_0_rgba(59,113,202,0.1)] dark:focus:shadow-[0_8px_9px_-4px_rgba(59,113,202,0.2),0_4px_18px_0_rgba(59,113,202,0.1)] dark:active:shadow-[0_8px_9px_-4px_rgba(59,113,202,0.2),0_4px_18px_0_rgba(59,113,202,0.1)]">
					Call to action </button>
			</div>
		</header>
		<div class="content" id="content-section">
			<p class="my-4">Scroll down</p>
			<p class="mb-4">Scroll down</p>
			<p class="mb-4">Scroll down</p>
			<p class="mb-4">Scroll down</p>
			<p class="mb-4">Scroll down</p>
			<p class="mb-4">Scroll down</p>
			<p class="mb-4">Scroll down</p>
			<p class="mb-4">Scroll down</p>
		</div>
		<script>
		document.addEventListener('DOMContentLoaded', () => {
			const header = document.getElementById('header');
			const headerContent = document.getElementById('header-content');

			const handleScroll = () => {
				const scrollPosition = window.scrollY;

				if (scrollPosition > 0) {
					header.classList.add('bg-neutral-100', 'shadow-md', 'dark:bg-neutral-700', 'dark:shadow-neutral-800');
					headerContent.style.paddingTop = '80px';
				} else {
					header.classList.remove('bg-neutral-100', 'shadow-md', 'dark:bg-neutral-700', 'dark:shadow-neutral-800');
					headerContent.style.paddingTop = '120px';
				}
			};

			window.addEventListener('scroll', handleScroll);
			handleScroll(); // Initial render
		});
		</script>
	</body>
</html>
