<!doctype html>
<html>
<head>
    <title>Font Availability Notification</title>
    <style>
        .system-font-active {
            color: #efefef; /* Change the color to light grey */
        }
    </style>
</head>
<body>
 <p id="font_100" style="font-family: 'Apple Chancery', 'ui-sans-serif', 'system-ui', 'sans-serif', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji'; color: gray;">This is a font</p>
    <li>
        <button onclick="notifyMe()">Settings</button> <span class="button-description">To access your settings and choose whether to temporary allow the use of your system's fonts, click this button.</span><br />
    </li>

    <script>
        function notifyMe() {
            Notification.requestPermission().then((permission) => {
                if (permission === "granted") {
                    new Notification("Reviewing Local Fonts");
                    logFontData();
                }
            });
        }

            async function logFontData() {
            try {
               const availableFonts = await window.queryLocalFonts()
               const fontFamily = getCss("#font_100")[0].style
               const specifiedFont = fontFamily.split(",")[0].trim()
               const isFontAvailable = availableFonts.some((font) => font.postscriptName === specifiedFont)
               if (isFontAvailable) {
                  document.body.classList.add("system-font-active")
                  console.log(`The specified font ${specifiedFont} is available locally.`)
                  style: window.getComputedStyle(element, null).getPropertyValue('font-family')

               } else {
                  console.log(`The specified font ${specifiedFont} is not available locally.`)
               }
            } catch (err) {
               console.error(err.name, err.message)
            }
         }
		</script>
	</body>
</html>
