<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8">

      <link rel="stylesheet" href="../sizes.css">
      <title>System Fonts</title>
      <style>
         @import url("https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap");
         :root {

            --white: #f7f7f7;
            --grey-10: #edeeed;
            --grey-20: #d3d4d4;
            --grey-30: #bababa;
            --grey-40: #8f8f8f;
            --grey-50: #6b6b6b;
            --grey-60: #525252;
            --grey-70: #454545;
            --grey-80: #313030;
            --grey-90: #272727;
            --black: #1d1d1b;
            font-size: (var(--s22), 2vw, var(--s30))
         }
         * {
            margin: 0;
            padding: 0;
         }
         body {
            background-color: var(--black);
            color: var(--white);
            font-family: "Khmer MN";
         }
         .grid-container {
            display: grid;
	         grid-template-columns: repeat(2, 1fr);
            grid-gap: var(--s10);
            position: relative;
            justify-content: center;
            align-content: center;
            max-width: 65%
         }
         .grid-item {
            background: rgb(42,42,42);
            background: linear-gradient(90deg, rgba(42,42,42,1) 0%, rgba(86,84,87,1) 28%, rgba(87,86,86,1) 31%, rgba(83,83,83,1) 34%, rgba(40,43,43,1) 100%);
            border-radius:1rem;
            padding: 20px;
            position: relative;
            text-align: center;
            display: block
            }

         .grid-item::before {
            content: "";
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 1px solid var(--grey-60);
            pointer-events: none;
            }

   <body>
      <div class="grid-container">
         <div class="grid-item">options menu example</div>
         <div class="grid-item">Grid cell 2</div>

      </div>
      <div class="cell2 options-menu" onclick="myFunction()">
            Options
         <div class="options-menu-content" id="myOptions">
            <a href="#">Mac</a>
            <a href="#">Windows</a>
            <a href="#">Linux</a>
            <a href="#">User</a>

      </div>
