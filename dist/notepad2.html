<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Note</title>
    <style>
        /* Consolidated and cleaned-up CSS rules */
        .note-card {
            display: box;
        }

        .note {
            display: block;
            left: 20%;
            top: 30px;
            width: 150px;
            height: 150px;
            position: absolute;
            border: none;
            box-shadow: 3px 3px 3px rgba(33, 33, 33, .7);
            min-width: 100px;
            min-height: 100px;
            z-index: 200;
        }

        .note textarea {
            white-space: break-spaces;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            resize: none;
            width: 100%;
            height: 100%;
        }

        .note header {
            min-height: 30px;
            cursor: grab;
            outline: olivedrab .1em solid;
        }

        .note .note-resize {
            position: absolute;
            bottom: -5px;
            right: -5px;
            cursor: nwse-resize;
        }

        a:hover {
            text-decoration: line-through;
        }

        img {
            box-shadow: 1px 1px 3px 1px rgb(15 15 15 / 61%);
            max-block-size: 100%;
            max-inline-size: 100%;
        }

        #home-link {
            position: fixed;
            z-index: 300;
            display: flex;
            background-color: burlywood;
            inline-size: 275px;
            inset-block-start: 0;
            margin-block-start: 30px;
            margin-inline-start: 55px;
        }

        a:hover {
            text-decoration: line-through;
        }

        img {
            box-shadow: 1px 1px 3px 1px rgb(15 15 15 / 61%);
            max-block-size: 100%;
            max-inline-size: 100%;
        }

        .navbar {
            position: fixed;
            z-index: 103;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            background-color: whitesmoke;
            block-size: 100px;
            inline-size: 100%;
            inset-block-start: 0;
            inset-inline-start: 0;
        }

        .navbar-group {
            display: flex;
            justify-content: flex-end;
            gap: 2em;
            padding-inline-end: 180px;
        }

        .nav-links {
            padding: 25px;
            color: hsl(0deg 0% 16% / 100%);
            font-family: "Acuminprowide_Sans", sans-serif;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <img id="home-link" src="your-image-source.jpg" alt="Home" height="136px" width="275px">
    <nav class="navbar">
        <ul class="navbar-group">
            <li class="nav-items"><a class="nav-links" href="#">work</a></li>
            <li class="nav-items"><a class="nav-links" href="#">cv</a></li>
            <li class="nav-items"><a class="nav-links" href="#">contact</a></li>
        </ul>
        <card class="note-card">
            <div class="note">
                <header>hello</header>
                <textarea dir="auto">consider debouncing the mousemove or touchmove</textarea>
                <div class="note-resize"></div>
            </div>
        </card>
        </main>
        <script src="notepad.js"></script>
        <script src="notepad2.js"></script>
</body>
</html>
