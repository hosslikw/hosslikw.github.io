		<style>
			header {
				font-size: 12px;
				line-height: 100%;
				position: fixed;
				top: 0;
				left: 0;
				inline-size: 100%;
				z-index: 20;
			}

			.container {
				max-inline-size: 1800px;
				margin: auto;
				padding: 20px;
			}

			.column {
				inline-size: 100%;
				margin-inline-end: 0;
				margin-block-end: 30px;
			}

			.flex-container {
				display: flex;
				gap: 20px;
				position: relative;
			}


			.column::after {
				content: '';
				position: absolute;
				left: 100%;
				bottom: 0;
				inline-size: 20px;
				block-size: 2px;
				background: var(--black);
				z-index: 1;
			}

			.last-column::after {
				display: none;
			}

			.header-bottom,
			.main-content {
				display: flex;
				gap: 1rem;
				flex-wrap: wrap;
				flex-direction: column;
			}

			.button-close {
				background-color: #ffd700;
				color: #000;
				border: none;
				font-size: 1rem;
				cursor: pointer;
				display: inline-block;
				margin-block-end: 15px;
				align-self: auto;
			}

			.header-bottom {
				position: relative;
				z-index: 2;
				padding-block-start: var(--s8);
				padding-block-end: var(--s8);
				border-block-end: var(--s1) solid var(--page-bg);
				background-color: var(--page-bg);
			}

			hr {
				block-size: 0;
				border: 0;
				border-block-start: var(--s1);
				border-block-end: var(--s1) solid var(--grey-60);
				margin-block-start: var(--s21);
				margin-block-end: var(--s16);
				outline: solid, 2px var(--black);
			}
		</style>
