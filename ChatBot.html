<!doctype html>
<html lang="en">
  <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	 <title>Updated Design</title>
	<link rel="stylesheet" href="essentials.css">
	 <style>


			*, *:before, *:after {
		box-sizing: border-box;
		}

		body {
		margin: 0;
		padding: 0;
		font-family: sans-serif;
		background-color: #fff;
		color: #333;
		}

		header {
		font-size: 12px;
		line-height: 100%;
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		z-index: 20;
		}

		.container {
		max-width: 1800px;
		margin: auto;
		padding: 20px;
		}

		.column {
		width: 100%;
		margin-right: 0;
		margin-bottom: 30px;
		}

		.flex-container {
		display: flex;
		gap: 20px;
		position: relative;
		}


		.column::after {
		content: '';
		position: absolute;
		left: 100%;
		bottom: 0;
		width: 20px;
		height: 2px;
		background: black;
		z-index: 1;
		}

		.last-column::after {
		display: none;
		}

		.header-bottom,
		.main-content {
		display: flex;
		gap: 1rem;
		flex-wrap: wrap;
		flex-direction: column;
		}

		.button-close {
		background-color: #ffd700;
		color: #000;
		border: none;
		font-size: 1rem;
		cursor: pointer;
		display: inline-block;
		margin-bottom: 15px;
		align-self: auto;
		}

	   .header-bottom {
		  position: relative;
		  z-index: 2;
		  padding-top: var(--s8);
		  padding-bottom: var(--s8);
		  border-bottom: var(--s1) solid var(--page-bg);
		  background-color: var(--page-bg);
		}
		hr {
		height: 0;
		border: 0;
		border-top-width: var(--s1);
		border-bottom: var(--s1) solid var(--grey-60);
		margin-top: var(--s21);
		margin-bottom: var(--s16);
		outline: solid, 2px var(--black);
		}
		nav a {
		  font-size: 1.5rem;
		  text-decoration: none;
		}
	 </style>
  </head>
